  <text x='800' y='126' fill='#c4d2ef' font-size='28' font-family='Inter, sans-serif' text-anchor='middle'>ClipMate · 预览与编辑</text>
  <rect x='150' y='162' width='914' height='706' rx='32' fill='#0e172a' stroke='#253654'/>
