  <text x='192' y='226' fill='#ffffff' font-size='34' font-family='Inter, sans-serif'>Landing Page 文案</text>
  <text x='192' y='268' fill='#8ba0c7' font-size='22' font-family='Inter, sans-serif'>文本条目 · 可编辑 · Cmd + S 保存</text>
  <rect x='192' y='312' width='830' height='480' rx='24' fill='#111c31' stroke='#30476f'/>
  <text x='234' y='372' fill='#dfe8ff' font-size='26' font-family='Inter, sans-serif'>ClipMate 是一款本地优先的 macOS 剪贴板管理工具。</text>
  <text x='234' y='420' fill='#b8caf0' font-size='24' font-family='Inter, sans-serif'>它自动记录你复制过的文本、链接、图片、文件与颜色，并支持</text>
  <text x='234' y='462' fill='#b8caf0' font-size='24' font-family='Inter, sans-serif'>搜索、OCR、直接粘贴、Paste Stack 与可选 iCloud Drive 同步。</text>
  <text x='234' y='540' fill='#8ba0c7' font-size='24' font-family='Inter, sans-serif'>在这里你可以继续编辑内容、修改链接、旋转图片，或提取 OCR 文本。</text>
  <rect x='192' y='816' width='152' height='40' rx='20' fill='#5b7ef7'/>
  <text x='268' y='842' fill='white' font-size='21' font-family='Inter, sans-serif' text-anchor='middle'>保存</text>
  <rect x='362' y='816' width='184' height='40' rx='20' fill='#14233e'/>
  <text x='454' y='842' fill='#d8e4ff' font-size='21' font-family='Inter, sans-serif' text-anchor='middle'>复制为纯文本</text>
  <text x='1138' y='226' fill='#ffffff' font-size='28' font-family='Inter, sans-serif'>条目信息</text>
  <text x='1138' y='286' fill='#8ba0c7' font-size='22' font-family='Inter, sans-serif'>来源应用：Figma</text>
  <text x='1138' y='326' fill='#8ba0c7' font-size='22' font-family='Inter, sans-serif'>更新时间：今天 14:26</text>
  <text x='1138' y='366' fill='#8ba0c7' font-size='22' font-family='Inter, sans-serif'>标签：文本 / 官网</text>
  <rect x='1138' y='420' width='274' height='154' rx='24' fill='#121e33' stroke='#2a3d5f'/>
  <text x='1170' y='472' fill='#dfe8ff' font-size='22' font-family='Inter, sans-serif'>可执行操作</text>
  <text x='1170' y='518' fill='#8ba0c7' font-size='20' font-family='Inter, sans-serif'>• 编辑文本与链接</text>
  <text x='1170' y='552' fill='#8ba0c7' font-size='20' font-family='Inter, sans-serif'>• 查看图片与 OCR</text>
  <text x='1170' y='586' fill='#8ba0c7' font-size='20' font-family='Inter, sans-serif'>• Quick Look 文件</text>
  <rect x='1138' y='622' width='274' height='182' rx='24' fill='#121e33' stroke='#2a3d5f'/>
  <text x='1170' y='674' fill='#dfe8ff' font-size='22' font-family='Inter, sans-serif'>预览优势</text>
